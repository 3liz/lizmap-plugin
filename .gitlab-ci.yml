variables:
  PRODUCT_NAME: lizmap_qgis_plugin

stages:
- lint
- test
- build
- deploy

# ------------
# Lint
# ------------

lint:
  image: ${REGISTRY_URL}/factory-ci-runner:qgis-${QGIS_FLAVOR}
  tags:
    - factory-plain
  stage: lint
  script:
    # No need since we do not type checking atm
    #- pip install --quiet -r requirements/dev.txt
    - make lint
  parallel:
    matrix:
      - QGIS_FLAVOR: [ "ltr", "release" ]

# ------------
# Tests
# ------------

.tests:
  image: ${REGISTRY_URL}/factory-ci-runner:factory-ci
  tags:
    - factory-dind
  stage: test
  script:
    - make docker-test QGIS_VERSION=$QGIS_FLAVOR

qgis-tests:
  extends: .tests
  parallel:
    matrix:
      - QGIS_FLAVOR: [
        "3.34",
        "3.40",
        "3.44",
        "4.0",
      ]


# NOTE: Following jobs are triggered only on RELEASE_BRANCH == "true"

# 
# Packages 
#


build:
  image: $REGISTRY_URI/factory-ci-runner:qgis-plugin-ci
  stage: build
  tags:
    - factory-plain
  rules:
    - if: '$CI_COMMIT_TAG =~ /^(?:release-|v)?\d+\.\d+\.\d+(?:-.*)?$/'
      variables:
        PRERELEASE: ""
    - if: $RELEASE_BRANCH == "true"
      variables:
        PRERELEASE: "--pre"
  script:
    - >-
      qt-transifex -vv pull
      --transifex-token ${TX_TOKEN}
      --compile
    - echo "Building plugin ${PRODUCT_NAME}"
    - yapt-pkg package $PRERELEASE
    - echo "PACKAGE=`ls -1 *.zip`" > build.env
    - cat build.env
  artifacts:
    reports:
      dotenv: build.env
    paths:
      - "*.zip"

deploy:
  image: ${REGISTRY_URL}/factory-ci-runner:fabric-ci
  tags:
    - fabric
  stage: deploy
  rules:
    - if: '$CI_COMMIT_TAG =~ /^(?:release-|v)?\d+\.\d+\.\d+(?:-.*)?$/'
    - if: $RELEASE_BRANCH == "true"
  dependencies:
    - build
  script:
    - upload_plugins ${PRODUCT_NAME} ${PACKAGE}
